name: Monthly Release Notes

on:
  schedule:
    - cron: '0 9 1 * *'   # Runs at 9:00 AM UTC on the 1st of every month
  workflow_dispatch:        # Also allows manual trigger from GitHub Actions UI

jobs:
  generate-release-notes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and email release notes draft
        env:
          ATLASSIAN_DOMAIN:    ${{ secrets.ATLASSIAN_DOMAIN }}
          ATLASSIAN_EMAIL:     ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:     kevin.jackson@rohirrim.ai
          CONFLUENCE_SPACE_KEY: RohanProcure
        run: python generate_release_notes.py
